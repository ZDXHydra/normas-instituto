<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Normas de Uso del Sistema</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      /* Segoe UI Emoji asegura emojis correctos en Windows */
      font-family: 'Segoe UI', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
      background: linear-gradient(135deg, #c41e3a 0%, #a01830 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .modal {
      background: white;
      border-radius: 12px;
      max-width: 800px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.85; transform: scale(1.06); }
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #c41e3a 0%, #a01830 100%);
      color: white;
      padding: 28px 30px;
      text-align: center;
      border-radius: 12px 12px 0 0;
    }
    .header h1 { font-size: 1.9em; margin-bottom: 8px; }
    .header p  { opacity: 0.9; font-size: 0.95em; }

    /* Grid */
    .content-wrapper {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 25px;
      overflow-y: auto;
    }

    .section h2 {
      font-size: 1.2em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section h2.normas   { color: #c41e3a; }
    .section h2.noticias { color: #007bff; }

    /* Badge NUEVO — solo aparece si la fecha del contenido < 7 días */
    .badge-nuevo {
      display: inline-block;
      background: #c41e3a;
      color: white;
      padding: 2px 9px;
      border-radius: 4px;
      font-size: 0.58em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      animation: pulse 1.6s ease-in-out infinite;
      line-height: 1.9;
    }
    .badge-nuevo.azul { background: #007bff; }

    /* Cajas de contenido */
    .section-content {
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      background: #f5f5f5;
      font-size: 0.92em;
      line-height: 1.65;
      max-height: 300px;
      overflow-y: auto;
    }
    #normas-content   { border-left: 4px solid #c41e3a; }
    #noticias-content { border-left: 4px solid #007bff; }

    /* Estados */
    .estado { text-align: center; padding: 22px 10px; font-size: 0.9em; }
    .estado.cargando { color: #999; }
    .estado.error    { color: #c41e3a; }

    .spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 3px solid #e0e0e0;
      border-top-color: #c41e3a;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-reintentar {
      margin-top: 10px;
      padding: 6px 16px;
      background: #c41e3a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.88em;
    }
    .btn-reintentar:hover { background: #a01830; }

    /* Tarjeta noticia */
    .noticia-card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      border-left: 3px solid #007bff;
    }
    .noticia-cabecera {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .noticia-fecha    { font-size: 0.8em; color: #888; }
    .noticia-titulo   { font-weight: 700; color: #c41e3a; margin-bottom: 4px; }
    .noticia-body     { font-size: 0.9em; color: #333; }

    /* Footer */
    .footer {
      padding: 18px 25px;
      border-top: 2px solid #ddd;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      flex: 1;
      min-width: 220px;
    }
    .checkbox-container input { width: 20px; height: 20px; cursor: pointer; accent-color: #28a745; }
    .checkbox-container label { font-weight: 500; cursor: pointer; }

    .btn-continue {
      padding: 12px 36px;
      background: #ccc;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 700;
      cursor: not-allowed;
      text-transform: uppercase;
      transition: background 0.25s, transform 0.15s, box-shadow 0.15s;
    }
    .btn-continue.activo { background: #28a745; cursor: pointer; }
    .btn-continue.activo:hover {
      background: #218838;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(40,167,69,0.35);
    }

    @media (max-width: 680px) {
      .content-wrapper { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.4em; }
      .footer { flex-direction: column; align-items: stretch; }
      .btn-continue { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
<div class="modal">

  <div class="header">
    <h1>⚠️ Normas de Uso del Sistema</h1>
    <p>Debe leer y aceptar las normas para continuar</p>
  </div>

  <div class="content-wrapper">
    <div class="section">
      <h2 class="normas">📋 Normas <span id="badge-normas"></span></h2>
      <div id="normas-content" class="section-content">
        <div class="estado cargando"><div class="spinner"></div><br>Cargando normas…</div>
      </div>
    </div>

    <div class="section">
      <h2 class="noticias">📰 Noticias <span id="badge-noticias"></span></h2>
      <div id="noticias-content" class="section-content">
        <div class="estado cargando"><div class="spinner"></div><br>Cargando noticias…</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <label class="checkbox-container">
      <input type="checkbox" id="accept-checkbox">
      <label for="accept-checkbox">Acepto las normas de uso del sistema</label>
    </label>
    <button class="btn-continue" id="continue-btn" disabled>Continuar</button>
  </div>

</div>
<script>
  /* ── Config ─────────────────────────────────────── */
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyw3SZWBXDkdCveM6bExvJp0rPIUyfZMjT6tU2mPUi16iBZdvja77MtH_D29rqSlsxb/exec';
  const TIMEOUT_MS  = 8000;
  const DIAS_NUEVO  = 7;

  /* ── DOM ─────────────────────────────────────────── */
  const checkbox       = document.getElementById('accept-checkbox');
  const continueBtn    = document.getElementById('continue-btn');
  const normasEl       = document.getElementById('normas-content');
  const noticiasEl     = document.getElementById('noticias-content');
  const badgeNormas    = document.getElementById('badge-normas');
  const badgeNoticias  = document.getElementById('badge-noticias');

  /* ── Checkbox ────────────────────────────────────── */
  checkbox.addEventListener('change', () => {
    continueBtn.disabled = !checkbox.checked;
    continueBtn.classList.toggle('activo', checkbox.checked);
  });

  /* ── Continuar ───────────────────────────────────── */
  continueBtn.addEventListener('click', () => {
    if (!checkbox.checked) return;
    localStorage.setItem('normasAceptadas', 'true');
    if (typeof chrome !== 'undefined' && chrome.runtime?.sendMessage) {
      try { chrome.runtime.sendMessage({ action: 'aceptarNormas' }); } catch (_) {}
    }
    setTimeout(() => { window.location.href = 'https://www.google.com'; }, 300);
  });

  /* ── Fetch con timeout ───────────────────────────── */
  function fetchConTimeout(url, ms) {
    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
  }

  /* ── ¿Fecha reciente? ────────────────────────────────────────────────
     "Nuevo" aparece SOLO si la fecha que devuelve el servidor
     tiene menos de DIAS_NUEVO días. No depende del localStorage.
     El admin controla cuándo es "nuevo" simplemente poniendo
     la fecha actual en la fila de Google Sheets.
  ───────────────────────────────────────────────────────────────────── */
  function esFechaReciente(fechaISO) {
    if (!fechaISO) return false;
    const dias = (Date.now() - new Date(fechaISO).getTime()) / 86_400_000;
    return dias >= 0 && dias < DIAS_NUEVO;
  }

  /* ── Crear badge ─────────────────────────────────── */
  function makeBadge(extra = '') {
    const s = document.createElement('span');
    s.className = 'badge-nuevo' + (extra ? ' ' + extra : '');
    s.textContent = 'Nuevo';
    return s;
  }

  /* ── Sanitizar ───────────────────────────────────── */
  function sanitize(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML
      .replace(/&lt;(\/?(br|p|strong|em|ul|ol|li|h3|h4))(\s*\/?)&gt;/g, '<$1$3>');
  }

  /* ── Mostrar error ───────────────────────────────── */
  function mostrarError(el, msg, fn) {
    el.innerHTML = `<div class="estado error">⚠️ ${msg}<br>
      <button class="btn-reintentar" onclick="(${fn.toString()})()">🔄 Reintentar</button></div>`;
  }

  /* ── Cargar normas ───────────────────────────────── */
  async function cargarNormas() {
    normasEl.innerHTML = `<div class="estado cargando"><div class="spinner"></div><br>Cargando normas…</div>`;
    badgeNormas.innerHTML = '';
    try {
      const res  = await fetchConTimeout(APPS_SCRIPT_URL + '?type=normas', TIMEOUT_MS);
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error('Respuesta no válida del servidor. Comprueba que el Apps Script está publicado como "Cualquier persona".'); }

      if (!data.normas) throw new Error('El campo "normas" no existe en la respuesta.');

      normasEl.innerHTML = sanitize(data.normas);

      // Badge solo si lastUpdated < 7 días
      if (esFechaReciente(data.lastUpdated)) {
        badgeNormas.appendChild(makeBadge());
      }
    } catch (err) {
      console.error('[Normas]', err.message);
      mostrarError(normasEl, 'No se pudieron cargar las normas.', cargarNormas);
    }
  }

  /* ── Cargar noticias ─────────────────────────────── */
  async function cargarNoticias() {
    noticiasEl.innerHTML = `<div class="estado cargando"><div class="spinner"></div><br>Cargando noticias…</div>`;
    badgeNoticias.innerHTML = '';
    try {
      const res  = await fetchConTimeout(APPS_SCRIPT_URL + '?type=noticias', TIMEOUT_MS);
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error('Respuesta no válida del servidor.'); }

      const lista = data.noticias;
      if (!Array.isArray(lista) || lista.length === 0) {
        noticiasEl.innerHTML = '<div class="estado cargando">📭 No hay noticias por el momento.</div>';
        return;
      }

      lista.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

      // Badge en el título si alguna noticia es reciente
      if (lista.some(n => esFechaReciente(n.fecha))) {
        badgeNoticias.appendChild(makeBadge('azul'));
      }

      noticiasEl.innerHTML = lista.map(n => {
        const reciente = esFechaReciente(n.fecha);
        const fecha    = new Date(n.fecha).toLocaleDateString('es-ES');
        return `<div class="noticia-card">
          <div class="noticia-cabecera">
            <span class="noticia-fecha">${fecha}</span>
            ${reciente ? '<span class="badge-nuevo azul" style="font-size:0.62em;padding:1px 7px;line-height:1.8">Nuevo</span>' : ''}
          </div>
          <div class="noticia-titulo">${sanitize(n.titulo)}</div>
          <div class="noticia-body">${sanitize(n.contenido)}</div>
        </div>`;
      }).join('');

    } catch (err) {
      console.error('[Noticias]', err.message);
      mostrarError(noticiasEl, 'No se pudieron cargar las noticias.', cargarNoticias);
    }
  }

  /* ── Arrancar ────────────────────────────────────── */
  cargarNormas();
  cargarNoticias();
</script>
</body>
</html>
